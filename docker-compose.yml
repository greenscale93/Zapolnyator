version: '3'

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  telegram-gateway:
    build: ./telegram-gateway
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ORCHESTRATOR_URL=http://orchestrator:8000
      - REDIS_URL=redis://redis:6379
      - TEMP_DIR=/app/temp
    volumes:
      - ./temp:/app/temp
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - orchestrator
    restart: unless-stopped

  orchestrator:
    build: ./orchestrator
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=sqlite:///app/data/rules.db
      - WORKER_URL=http://worker:8000
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - ./data:/app/data
      - ./temp:/app/temp
    ports:
      - "8001:8000"
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build: ./worker
    environment:
      - TEMP_DIR=/app/temp
    volumes:
      - ./temp:/app/temp
    ports:
      - "8002:8000"
    restart: unless-stopped