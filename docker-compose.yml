version: '3'

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  telegram-gateway:
    build: ./telegram-gateway
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ORCHESTRATOR_URL=http://orchestrator:8000   # пока не используется
      - REDIS_URL=redis://redis:6379                # пока не используется
      - TEMP_DIR=${TEMP_DIR:-/app/temp}
    volumes:
      - ./temp:/app/temp
    ports:
      - "8000:8000"   # внутренний API (не обязателен сейчас)
    depends_on:
      - redis
    restart: unless-stopped