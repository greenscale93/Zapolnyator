name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Deploy via SSH
        id: deploy
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            mkdir -p ~/.ssh
            echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
            chmod 600 ~/.ssh/id_rsa
            ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null

            cd /home/${{ secrets.VPS_USER }}/Zapolnyator || git clone git@github.com:${{ github.repository }}.git /home/${{ secrets.VPS_USER }}/Zapolnyator
            cd /home/${{ secrets.VPS_USER }}/Zapolnyator
            git fetch origin
            git reset --hard origin/main

            echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" > .env
            echo "DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}" >> .env
            echo "TEMP_DIR=/app/temp" >> .env
            echo "ORCHESTRATOR_URL=http://orchestrator:8000" >> .env
            echo "WORKER_URL=http://worker:8000" >> .env
            echo "REDIS_URL=redis://redis:6379" >> .env

            mkdir -p temp data
            docker compose down
            docker compose up -d --build

      - name: Notify success
        if: success()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="✅ Деплой успешен! Контейнеры перезапущены и работают.\n\nДоступные команды:\n/start - начать работу\n/reset - сбросить состояние\n/autotest - включить/выключить автотест\n/stop - остановить текущую задачу"

      - name: Notify failure
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="❌ Ошибка деплоя. Проверьте логи Actions."