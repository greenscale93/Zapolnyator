name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            # Настраиваем SSH-ключ для git clone
            mkdir -p ~/.ssh
            echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
            chmod 600 ~/.ssh/id_rsa
            ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null

            # Клонируем или обновляем репозиторий через SSH
            cd /home/${{ secrets.VPS_USER }}/Zapolnyator || git clone git@github.com:${{ github.repository }}.git /home/${{ secrets.VPS_USER }}/Zapolnyator
            cd /home/${{ secrets.VPS_USER }}/Zapolnyator
            git fetch --all
            git reset --hard origin/main

            # Создаём .env
            echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" > .env
            echo "TEMP_DIR=/app/temp" >> .env

            mkdir -p temp
            docker compose down
            docker compose up -d --build